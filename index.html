<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EcoOS Environmental Monitoring</title>

<!-- CHART JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #e8f5e9;
  color: #2e7d32;
}

h1 {
  text-align: center;
  padding: 20px;
}

/* ===== DASHBOARD ===== */
.dashboard {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

/* ===== CARD ===== */
.card {
  background: #ffffff;
  width: 300px;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

/* ===== WEATHER ===== */
.weather p {
  font-size: 16px;
}

/* ===== FLOOD ===== */
.meter {
  width: 80px;
  height: 250px;
  border: 3px solid #000;
  margin: auto;
  position: relative;
  border-radius: 10px;
  overflow: hidden;
}

.water {
  width: 100%;
  height: 30%;
  background: #4fc3f7;
  position: absolute;
  bottom: 0;
  transition: 0.5s;
}

.status {
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  margin-top: 15px;
}

/* ===== FOOTER ===== */
footer {
  text-align: center;
  padding: 10px;
  font-size: 12px;
}
</style>
</head>

<body>

<h1>🌱 EcoOS Environmental Monitoring System</h1>

<div class="dashboard">

  <!-- WEATHER MONITORING -->
  <div class="card weather">
    <h2>🌤️ Weather Monitoring</h2>
    <p>📍 Location: Manila</p>
    <p>🌡️ Temperature: <span id="temp">--</span> °C</p>
    <p>💧 Humidity: <span id="humidity">--</span> %</p>
    <p>🌧️ Rain Chance: <span id="rain">--</span> %</p>
    <p id="weatherStatus"></p>
  </div>

  <!-- FLOOD ALERT -->
  <div class="card">
    <h2>🌊 Flood Alert System</h2>
    <div class="meter">
      <div class="water" id="water"></div>
    </div>
    <div class="status" id="floodStatus">SAFE</div>
  </div>

</div>

<!-- CHART -->
<div class="card" style="width: 90%; margin: auto;">
  <h2>📈 Temperature Realtime Chart</h2>
  <canvas id="weatherChart"></canvas>
</div>

<footer>
  EcoOS Simulation | Environmental Monitoring OS
</footer>

<script>
/* ===== WEATHER DATA ===== */
let temp = 31;
let humidity = 72;
let rain = 55;

/* ===== CHART SETUP ===== */
const ctx = document.getElementById('weatherChart').getContext('2d');
const weatherChart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: 'Temperature (°C)',
      data: [],
      borderWidth: 2,
      fill: false
    }]
  }
});

/* ===== WEATHER UPDATE ===== */
function updateWeather() {
  temp += Math.floor(Math.random() * 3 - 1);
  humidity += Math.floor(Math.random() * 4 - 2);
  rain += Math.floor(Math.random() * 6 - 3);

  if (rain < 0) rain = 0;
  if (rain > 100) rain = 100;

  document.getElementById("temp").innerText = temp;
  document.getElementById("humidity").innerText = humidity;
  document.getElementById("rain").innerText = rain;

  document.getElementById("weatherStatus").innerText =
    rain > 60 ? "🌧️ Rain expected in 2 hours" : "☀️ Clear weather";

  // UPDATE CHART
  weatherChart.data.labels.push("");
  weatherChart.data.datasets[0].data.push(temp);

  if (weatherChart.data.labels.length > 10) {
    weatherChart.data.labels.shift();
    weatherChart.data.datasets[0].data.shift();
  }

  weatherChart.update();
}

/* ===== FLOOD SYSTEM ===== */
let waterLevel = 30;

function updateFlood() {
  waterLevel += Math.floor(Math.random() * 10 - 3);

  if (waterLevel < 0) waterLevel = 0;
  if (waterLevel > 100) waterLevel = 100;

  document.getElementById("water").style.height = waterLevel + "%";

  let status = document.getElementById("floodStatus");

  if (waterLevel < 50) {
    status.innerText = "SAFE";
    status.style.color = "green";
  } 
  else if (waterLevel < 80) {
    status.innerText = "WARNING";
    status.style.color = "orange";
  } 
  else {
    status.innerText = "DANGER";
    status.style.color = "red";
    alert("⚠️ FLOOD DANGER! Evacuate immediately!");
  }
}

/* ===== INTERVALS ===== */
setInterval(updateWeather, 2000);
setInterval(updateFlood, 3000);

updateWeather();
updateFlood();
</script>

</body>
</html>
